<!DOCTYPE html>
<html lang="ro">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ChessForUs.ro - Logare</title>
   <link rel="stylesheet" type="text/css" href="../stiluri.css" />
</head>

<body class="body_login_register">
   <!-- fereastra de alerta -->
   <script type="text/javascript">
      alert('Niciodată să nu îți împărtășești datele personale nimănui!!!');
   </script>
   <h1 align="center">Logare</h1>

   <p align="left"> <img class="imagine_login_register" src="../imagini/imagine2.jpg" alt="Imagine Logo site"> </p>

   <form class="formular_login_register" action="/submit" method="POST">
      <label class="label_login_register" for="email">Email:</label>
      <input class="input_login_register" type="email" id="email" name="email" required>
      <br> <br>

      <label class="label_login_register" for="password">Parolă:</label>
      <input class="input_login_register" type="password" id="password" name="password" required>
      <br> <br>

      <label class="radio_label"> </label>
      <input type="radio" name="b" />Ține-mă minte!
      <br> <br> <br>

      <button class="buton_login_register" type="submit">Conectează-te</button>
   </form>

   <p align="center">Dacă nu ai un cont deja creat, poți apăsa <a class="link" href="inregistrare.html">aici</a> ca să îți creezi unul nou.</p>
</body>

</html>
